<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חדר בריחה דיגיטלי - פלטפורמה</title>
    
    <!-- ספריות עיצוב ופונטים -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #0b1120; color: #e2e8f0; overflow-x: hidden; }
        
        /* פונט מכונת כתיבה למסתורין */
        .theme-font { font-family: 'Courier New', Courier, monospace; letter-spacing: -0.5px; } 
        
        /* אנימציות */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
        
        @keyframes pulse-border { 0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(6, 182, 212, 0); } 100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); } }
        .active-level { border-color: #06b6d4; background-color: #1e293b; animation: pulse-border 2s infinite; }

        /* אזורים חמים */
        .hotspot-edit { border: 4px solid #06b6d4; background: rgba(6, 182, 212, 0.2); box-shadow: 0 0 15px rgba(6,182,212,0.5); z-index: 10; cursor: crosshair; }
        .hotspot-play { border: 4px solid transparent; z-index: 10; cursor: crosshair; transition: all 0.3s; }
        .hotspot-play:hover { border-color: rgba(255, 255, 255, 0.4); background: rgba(255, 255, 255, 0.1); }
        
        /* עיצוב פס גלילה */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b1120; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #0ea5e9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #0284c7; }

        /* כפתור אימות - עיצוב סוכן */
        .btn-agent { 
            background: linear-gradient(135deg, #0891b2 0%, #0e7490 100%);
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col overflow-hidden text-white">

    <!-- מסך פתיחה -->
    <div id="screen-intro" class="flex-1 flex flex-col items-center justify-center p-6 bg-slate-950 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900 to-[#0b1120]">
        <i class="fas fa-user-secret text-cyan-500 text-6xl mb-6 opacity-80"></i>
        <h1 class="text-6xl font-black text-cyan-400 mb-2 drop-shadow-[0_0_15px_rgba(6,182,212,0.5)] theme-font text-center">חדר בריחה דיגיטלי</h1>
        <p class="text-xl text-slate-400 mb-12 tracking-widest text-center">הפלטפורמה ליצירה ומשחק</p>
        
        <div class="grid md:grid-cols-2 gap-8 max-w-4xl w-full">
            <div class="bg-slate-900 rounded-3xl p-8 border border-slate-700 hover:border-indigo-500 transition-colors shadow-2xl flex flex-col items-center text-center relative overflow-hidden group">
                <div class="absolute inset-0 bg-indigo-500/5 group-hover:bg-indigo-500/10 transition-colors"></div>
                <div class="w-20 h-20 bg-indigo-900 border border-indigo-500 rounded-full flex items-center justify-center mb-6 shadow-[0_0_15px_rgba(99,102,241,0.5)] z-10">
                    <i class="fas fa-search text-indigo-300 text-3xl"></i>
                </div>
                <h2 class="text-3xl font-bold mb-4 z-10">אני תלמיד</h2>
                <p class="text-slate-400 mb-8 z-10">העלו את קובץ המשחק שהמורה שלח/ה לכם.</p>
                <label class="bg-indigo-600 hover:bg-indigo-500 border border-indigo-400 text-white px-8 py-4 rounded-xl font-bold text-xl cursor-pointer transition transform hover:scale-105 w-full block z-10 shadow-lg">
                    טען משחק והתחל
                    <input type="file" class="hidden" accept=".json" onchange="handleLoadGame(event, 'STUDENT')">
                </label>
            </div>

            <div class="bg-slate-900 rounded-3xl p-8 border border-slate-700 hover:border-cyan-500 transition-colors shadow-2xl flex flex-col items-center text-center relative overflow-hidden group">
                <div class="absolute inset-0 bg-cyan-500/5 group-hover:bg-cyan-500/10 transition-colors"></div>
                <div class="w-20 h-20 bg-cyan-900 border border-cyan-500 rounded-full flex items-center justify-center mb-6 shadow-[0_0_15px_rgba(6,182,212,0.5)] z-10">
                    <i class="fas fa-fingerprint text-cyan-300 text-3xl"></i>
                </div>
                <h2 class="text-3xl font-bold mb-4 z-10">אני מורה</h2>
                <div class="flex flex-col gap-3 w-full z-10">
                    <label class="bg-cyan-700 hover:bg-cyan-600 border border-cyan-500 text-white px-8 py-4 rounded-xl font-bold text-xl cursor-pointer transition transform hover:scale-105 block shadow-lg text-center">
                        יצירת חדר חדש
                        <input type="file" class="hidden" accept="image/*" onchange="handleNewGame(event)">
                    </label>
                    <label class="bg-slate-800 hover:bg-slate-700 border border-slate-600 text-cyan-300 px-8 py-3 rounded-xl font-bold cursor-pointer transition block text-center">
                        המשך עריכה (JSON)
                        <input type="file" class="hidden" accept=".json" onchange="handleLoadGame(event, 'TEACHER')">
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- מסך עריכה (מורה) -->
    <div id="screen-teacher" class="hidden flex-1 flex flex-col bg-[#0b1120] overflow-hidden h-screen">
        <header class="bg-slate-900 p-4 border-b border-slate-800 flex justify-between items-center shadow-lg z-30 shrink-0">
            <h1 class="text-2xl font-bold text-cyan-400 theme-font flex items-center gap-3">
                <i class="fas fa-database text-cyan-600"></i> עורך חדר בריחה
            </h1>
            <div class="flex gap-3 items-center">
                <button onclick="previewGame()" class="bg-indigo-600 hover:bg-indigo-500 border border-indigo-400 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition text-sm shadow-[0_0_10px_rgba(99,102,241,0.3)]">
                    <i class="fas fa-play"></i> בדיקת חדר (תצוגת תלמיד)
                </button>
                <div class="w-px h-6 bg-slate-700"></div>
                <button onclick="saveProjectFile()" class="bg-slate-800 hover:bg-slate-700 border border-slate-600 text-cyan-300 px-4 py-2 rounded-lg flex items-center gap-2 transition text-sm">
                    <i class="fas fa-download"></i> שמירת פרויקט (JSON)
                </button>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden min-h-0">
            <aside class="w-72 bg-slate-900 border-l border-slate-800 p-4 flex flex-col gap-4 z-20 shrink-0 h-full overflow-hidden">
                <div class="flex justify-between items-center mb-2 shrink-0">
                    <h2 class="font-bold text-lg text-slate-300 uppercase tracking-widest text-sm">שלבי החדר</h2>
                    <label class="bg-cyan-700 hover:bg-cyan-600 border border-cyan-500 w-8 h-8 rounded-full cursor-pointer transition flex items-center justify-center text-white">
                        <i class="fas fa-plus"></i>
                        <input type="file" class="hidden" accept="image/*" onchange="addLevelFromFile(event)">
                    </label>
                </div>
                <div id="teacher-sidebar-levels" class="space-y-4 overflow-y-auto flex-1 pr-2 pb-10 min-h-0"></div>
            </aside>

            <main class="flex-1 overflow-y-auto p-6 bg-[#0b1120] shadow-inner relative">
                <div id="teacher-main-content" class="max-w-4xl mx-auto flex flex-col items-center gap-8 pb-16 pt-4">
                    <div id="teacher-image-container" class="relative shadow-[0_0_30px_rgba(0,0,0,0.8)] border border-slate-700 rounded-lg overflow-hidden bg-black shrink-0">
                        <img id="teacher-image" src="" class="max-w-full max-h-[65vh] block pointer-events-none select-none opacity-90">
                        <div id="teacher-hotspot" class="absolute hotspot-edit"></div>
                    </div>

                    <div class="w-full bg-slate-900/80 p-6 rounded-xl border border-slate-700 grid grid-cols-2 gap-6 shadow-xl shrink-0 backdrop-blur-sm">
                        <div class="flex flex-col gap-2">
                            <label class="text-xs font-bold text-cyan-500 uppercase tracking-widest">השאלה לתלמיד:</label>
                            <textarea id="teacher-input-question" rows="2" class="bg-[#0b1120] border border-slate-700 rounded-lg px-4 py-3 text-slate-200 focus:outline-none resize-none"></textarea>
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-xs font-bold text-cyan-500 uppercase tracking-widest">התשובה הנכונה:</label>
                            <input id="teacher-input-answer" type="text" class="bg-[#0b1120] border border-slate-700 rounded-lg px-4 py-3 text-cyan-300 theme-font text-lg">
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- מסך תלמיד (משחק) - פריסה רחבה מובנית -->
    <div id="screen-student" class="hidden flex-1 flex flex-col bg-[#0b1120] overflow-hidden h-screen relative">
        <header id="student-header" class="bg-slate-900/90 backdrop-blur-md p-4 border-b border-cyan-900/50 flex justify-between items-center shadow-lg z-30 shrink-0">
            <h1 class="font-bold text-cyan-400 theme-font text-3xl tracking-widest flex items-center gap-3">
                <i class="fas fa-lock-open text-slate-500"></i> חדר בריחה
            </h1>
            <div class="flex items-center gap-4">
                <button id="btn-back-to-edit" onclick="returnToEditor()" class="hidden bg-slate-800 hover:bg-slate-700 border border-slate-500 text-slate-300 px-4 py-2 rounded-lg flex items-center gap-2 transition text-sm">
                    <i class="fas fa-arrow-right"></i> חזרה לעריכה
                </button>
                <div id="student-progress-text" class="text-cyan-100 font-bold bg-[#0b1120] border border-cyan-800 px-6 py-2 rounded-full text-sm tracking-wide shadow-[0_0_10px_rgba(6,182,212,0.1)]"></div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-6 shadow-inner relative z-10 flex flex-col items-center">
            <div class="w-full h-full flex flex-col gap-4">
                <!-- אזור התמונה - גודל מלא -->
                <div class="flex-1 relative shadow-[0_0_50px_rgba(0,0,0,0.9)] border-2 border-slate-700 rounded-2xl overflow-hidden bg-black flex items-center justify-center min-h-[50vh]">
                    <img id="student-image" src="" class="w-full h-full object-contain opacity-90">
                    <div id="student-hotspot" class="absolute hotspot-play" onclick="focusOnInput()"></div>
                </div>
                
                <!-- לוח בקרה תחתון (שאלה ותשובה) -->
                <div class="w-full max-w-5xl mx-auto bg-slate-900/95 backdrop-blur-md p-5 rounded-2xl border-t-4 border-cyan-500 shadow-2xl">
                    <div class="grid md:grid-cols-3 gap-6 items-center">
                        <div class="md:col-span-2">
                            <h3 class="text-cyan-500 text-xs font-bold uppercase tracking-[0.2em] mb-2">
                                <i class="fas fa-terminal"></i> הוראות החידה
                            </h3>
                            <p id="student-question-text" class="text-lg md:text-xl font-medium text-slate-200 leading-relaxed"></p>
                        </div>
                        
                        <div class="flex flex-col gap-3">
                            <div class="relative">
                                <input id="student-answer-input" type="text" placeholder="הקלידו תשובה..." autocomplete="off" 
                                    class="w-full bg-[#0b1120] border-2 border-slate-700 focus:border-cyan-500 rounded-xl px-4 py-4 text-center text-xl theme-font text-cyan-300 font-bold outline-none">
                                <i class="fas fa-key absolute left-4 top-1/2 -translate-y-1/2 text-slate-600"></i>
                            </div>
                            <button onclick="checkAnswer()" class="w-full btn-agent text-white font-bold py-3 rounded-xl transition transform active:scale-95 text-lg uppercase tracking-widest">
                                אימות צופן
                            </button>
                        </div>
                    </div>
                    <div id="student-feedback" class="hidden mt-4 text-center py-2 rounded-lg font-bold theme-font text-sm"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- מסך ניצחון -->
    <div id="screen-victory" class="hidden fixed inset-0 bg-[#0b1120] z-[200] flex flex-col items-center justify-center text-center p-8 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900 to-[#0b1120]">
        <div class="relative mb-10">
            <i class="fas fa-fingerprint text-9xl text-cyan-500 opacity-20"></i>
            <i class="fas fa-check absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-6xl text-cyan-400"></i>
        </div>
        <h1 class="theme-font text-7xl font-bold text-cyan-400 mb-6 uppercase tracking-widest">יצאתם לחופשי! 🏆</h1>
        <p class="text-xl text-slate-400 mb-12 max-w-lg">כל הכבוד, פיצחתם את כל החידות בהצלחה!</p>
        <div class="flex gap-4">
            <button onclick="location.reload()" class="bg-transparent border-2 border-cyan-600 text-cyan-400 px-10 py-3 rounded-full font-bold text-lg hover:bg-cyan-900/20">חזרה לבית</button>
            <button id="btn-victory-back-edit" onclick="returnToEditor()" class="hidden bg-indigo-600 text-white px-10 py-3 rounded-full font-bold text-lg">חזרה לעריכה</button>
        </div>
    </div>

    <script>
        let userRole = null; 
        let levels = [];
        let currentLevelIndex = 0;
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };

        const screens = {
            intro: document.getElementById('screen-intro'),
            teacher: document.getElementById('screen-teacher'),
            student: document.getElementById('screen-student'),
            victory: document.getElementById('screen-victory')
        };

        const teacherDOM = {
            sidebar: document.getElementById('teacher-sidebar-levels'),
            mainContent: document.getElementById('teacher-main-content'),
            imgContainer: document.getElementById('teacher-image-container'),
            img: document.getElementById('teacher-image'),
            hotspot: document.getElementById('teacher-hotspot'),
            inputQ: document.getElementById('teacher-input-question'),
            inputA: document.getElementById('teacher-input-answer')
        };

        const studentDOM = {
            progress: document.getElementById('student-progress-text'),
            img: document.getElementById('student-image'),
            hotspot: document.getElementById('student-hotspot'),
            questionText: document.getElementById('student-question-text'),
            answerInput: document.getElementById('student-answer-input'),
            feedback: document.getElementById('student-feedback')
        };

        function showScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.add('hidden'));
            screens[screenName].classList.remove('hidden');
        }

        function focusOnInput() {
            studentDOM.answerInput.focus();
            studentDOM.answerInput.classList.add('ring-2', 'ring-cyan-500');
            setTimeout(() => studentDOM.answerInput.classList.remove('ring-2', 'ring-cyan-500'), 1000);
        }

        function previewGame() {
            if (levels.length === 0) return;
            currentLevelIndex = 0;
            document.getElementById('btn-back-to-edit').classList.remove('hidden');
            document.getElementById('btn-victory-back-edit').classList.remove('hidden');
            renderStudentUI();
            showScreen('student');
        }

        function returnToEditor() {
            showScreen('teacher');
            renderTeacherUI();
        }

        function handleNewGame(event) {
            const file = event.target.files[0];
            if (!file) return;
            userRole = 'TEACHER';
            levels = [];
            currentLevelIndex = 0;
            addLevelFromFile(event);
            showScreen('teacher');
        }

        function handleLoadGame(event, role) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    levels = JSON.parse(e.target.result);
                    currentLevelIndex = 0;
                    userRole = role;
                    if(role === 'TEACHER') {
                        showScreen('teacher');
                        renderTeacherUI();
                    } else {
                        document.getElementById('btn-back-to-edit').classList.add('hidden');
                        document.getElementById('btn-victory-back-edit').classList.add('hidden');
                        showScreen('student');
                        renderStudentUI();
                    }
                } catch (err) { alert("שגיאה בקובץ."); }
            };
            reader.readAsText(file);
        }

        function addLevelFromFile(event) {
            const file = event.target.files ? event.target.files[0] : event;
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const imgData = e.target.result;
                if (file.type === 'image/gif') {
                    createNewLevel(imgData);
                } else {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX = 1280;
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > MAX) { h *= MAX/w; w = MAX; } }
                        else { if (h > MAX) { w *= MAX/h; h = MAX; } }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        createNewLevel(canvas.toDataURL('image/jpeg', 0.8));
                    };
                    img.src = imgData;
                }
            };
            reader.readAsDataURL(file);
        }

        function createNewLevel(imgData) {
            levels.push({
                id: Date.now(),
                image: imgData,
                question: 'מהי התשובה לחידה זו?',
                answer: '',
                hotspot: { x: 40, y: 40, width: 20, height: 20 }
            });
            currentLevelIndex = levels.length - 1;
            renderTeacherUI();
        }

        function removeLevel(index) {
            levels.splice(index, 1);
            if (currentLevelIndex >= levels.length && levels.length > 0) currentLevelIndex = levels.length - 1;
            renderTeacherUI();
        }

        function saveProjectFile() {
            const data = JSON.stringify(levels);
            const blob = new Blob([data], { type: 'application/json' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'escape-room.json';
            link.click();
        }

        function renderTeacherUI() {
            if (levels.length === 0) {
                teacherDOM.mainContent.style.visibility = 'hidden';
                teacherDOM.sidebar.innerHTML = '<p class="text-slate-500 text-center text-sm mt-10 italic">הוסיפו חידה...</p>';
                return;
            }
            teacherDOM.mainContent.style.visibility = 'visible';
            teacherDOM.sidebar.innerHTML = '';
            levels.forEach((lvl, idx) => {
                const div = document.createElement('div');
                div.className = `group relative p-2 rounded-xl border border-slate-700 cursor-pointer transition-all ${currentLevelIndex === idx ? 'active-level' : 'bg-slate-800'}`;
                div.onclick = () => { currentLevelIndex = idx; renderTeacherUI(); };
                div.innerHTML = `<img src="${lvl.image}" class="w-full h-20 object-cover rounded-md mb-2 opacity-80">
                    <div class="text-sm font-bold text-cyan-200">חידה ${idx + 1}</div>
                    <button onclick="event.stopPropagation(); removeLevel(${idx})" class="absolute top-3 left-3 bg-red-600 p-1.5 rounded-md opacity-0 group-hover:opacity-100 transition"><i class="fas fa-trash text-xs"></i></button>`;
                teacherDOM.sidebar.appendChild(div);
            });
            const current = levels[currentLevelIndex];
            teacherDOM.img.src = current.image;
            updateHotspotVisual(teacherDOM.hotspot, current.hotspot);
            teacherDOM.inputQ.value = current.question;
            teacherDOM.inputA.value = current.answer;
        }

        teacherDOM.inputQ.oninput = (e) => { if(levels[currentLevelIndex]) levels[currentLevelIndex].question = e.target.value; };
        teacherDOM.inputA.oninput = (e) => { if(levels[currentLevelIndex]) levels[currentLevelIndex].answer = e.target.value; };

        teacherDOM.imgContainer.onmousedown = (e) => {
            if(userRole !== 'TEACHER' || levels.length === 0) return;
            const rect = teacherDOM.imgContainer.getBoundingClientRect();
            dragStart.x = ((e.clientX - rect.left) / rect.width) * 100;
            dragStart.y = ((e.clientY - rect.top) / rect.height) * 100;
            isDragging = true;
            levels[currentLevelIndex].hotspot = { x: dragStart.x, y: dragStart.y, width: 0, height: 0 };
        };

        teacherDOM.imgContainer.onmousemove = (e) => {
            if(!isDragging || userRole !== 'TEACHER') return;
            const rect = teacherDOM.imgContainer.getBoundingClientRect();
            const curX = ((e.clientX - rect.left) / rect.width) * 100;
            const curY = ((e.clientY - rect.top) / rect.height) * 100;
            const x = Math.min(dragStart.x, curX), y = Math.min(dragStart.y, curY);
            levels[currentLevelIndex].hotspot = { 
                x: Math.max(0, Math.min(100, x)), y: Math.max(0, Math.min(100, y)),
                width: Math.abs(curX - dragStart.x), height: Math.abs(curY - dragStart.y) 
            };
            updateHotspotVisual(teacherDOM.hotspot, levels[currentLevelIndex].hotspot);
        };
        window.onmouseup = () => isDragging = false;

        function updateHotspotVisual(el, data) {
            el.style.top = data.y + "%"; el.style.left = data.x + "%";
            el.style.width = data.width + "%"; el.style.height = data.height + "%";
        }

        function renderStudentUI() {
            const current = levels[currentLevelIndex];
            studentDOM.progress.innerText = `חידה ${currentLevelIndex + 1} מתוך ${levels.length}`;
            studentDOM.img.src = current.image;
            studentDOM.questionText.innerText = current.question;
            studentDOM.answerInput.value = "";
            studentDOM.feedback.classList.add('hidden');
            updateHotspotVisual(studentDOM.hotspot, current.hotspot);
        }

        function checkAnswer() {
            const input = studentDOM.answerInput.value.trim().toLowerCase();
            const correct = levels[currentLevelIndex].answer.trim().toLowerCase();
            const fb = studentDOM.feedback;

            if (input === correct || (correct.length > 2 && input.includes(correct))) {
                fb.innerHTML = `<i class="fas fa-check-circle ml-2"></i> מצוין! המנעול נפתח.`;
                fb.className = "mt-4 block text-green-400 bg-green-900/20 py-2 rounded-lg";
                fb.classList.remove('hidden');
                setTimeout(() => {
                    if (currentLevelIndex < levels.length - 1) { currentLevelIndex++; renderStudentUI(); }
                    else showScreen('victory');
                }, 1500);
            } else {
                fb.innerHTML = `<i class="fas fa-times-circle ml-2"></i> טעות בצופן. נסו שוב!`;
                fb.className = "mt-4 block text-red-400 bg-red-900/20 py-2 rounded-lg";
                fb.classList.remove('hidden');
                studentDOM.answerInput.classList.add('animate-shake');
                setTimeout(() => studentDOM.answerInput.classList.remove('animate-shake'), 500);
            }
        }
        studentDOM.answerInput.onkeypress = (e) => { if (e.key === 'Enter') checkAnswer(); };
    </script>
</body>
